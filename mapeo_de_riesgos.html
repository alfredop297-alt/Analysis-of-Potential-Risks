<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapeador de Riesgos Profesional</title>
    <!-- Tailwind CSS para interfaz moderna y limpia -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Iconos de control Lucide -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- html2canvas para exportar planos en alta definición -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        .workspace-grid {
            background-color: #f8fafc;
            background-image: radial-gradient(#e2e8f0 1.5px, transparent 1.5px);
            background-size: 20px 20px;
        }
        .dragging {
            opacity: 0.6;
            cursor: grabbing !important;
            transform: scale(1.05);
        }
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #1e293b;
        }
        ::-webkit-scrollbar-thumb {
            background: #475569;
            border-radius: 3px;
        }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 h-screen flex flex-col font-sans overflow-hidden select-none">

    <!-- Cabecera principal con botones de control rápido -->
    <header class="bg-slate-800 border-b border-slate-700 px-6 py-3 flex justify-between items-center shrink-0">
        <div class="flex items-center gap-2">
            <div class="p-1.5 bg-amber-500 text-slate-950 rounded-lg">
                <i data-lucide="shield-alert" class="w-5 h-5"></i>
            </div>
            <h1 class="text-base font-bold text-white tracking-tight">Kimberly-Clark de México -Mapeo de Riesgos-</h1>
        </div>
        
        <div class="flex items-center gap-2">
            <button onclick="document.getElementById('file-upload').click()" class="bg-slate-700 hover:bg-slate-600 text-xs px-3 py-2 rounded-lg font-medium flex items-center gap-1.5 transition">
                <i data-lucide="upload" class="w-3.5 h-3.5 text-amber-400"></i>
                <span>Cargar Plano</span>
            </button>
            <input type="file" id="file-upload" class="hidden" accept="image/*" onchange="handleImageUpload(event)">
            
            <button onclick="loadSampleImage()" class="bg-slate-800 hover:bg-slate-700 text-slate-300 text-xs px-3 py-2 rounded-lg font-medium flex items-center gap-1.5 transition border border-slate-700">
                <i data-lucide="image" class="w-3.5 h-3.5"></i>
                <span>Plano de Ejemplo</span>
            </button>

            <button onclick="exportAsImage()" class="bg-emerald-600 hover:bg-emerald-500 text-white text-xs font-bold px-4 py-2 rounded-lg flex items-center gap-1.5 transition">
                <i data-lucide="download" class="w-3.5 h-3.5"></i>
                <span>Exportar Mapa</span>
            </button>

            <button onclick="openConfirmModal()" class="bg-red-950/40 hover:bg-red-900/40 border border-red-900/60 text-red-200 text-xs px-2.5 py-2 rounded-lg flex items-center justify-center transition" title="Limpiar todo">
                <i data-lucide="trash-2" class="w-3.5 h-3.5"></i>
            </button>
        </div>
    </header>

    <!-- Contenido principal estructurado -->
    <div class="flex-1 flex overflow-hidden">
        
        <!-- Lateral Izquierdo: Buscador y Listado de Riesgos -->
        <aside class="w-80 bg-slate-800 border-r border-slate-700 flex flex-col p-4 overflow-y-auto shrink-0 gap-3">
            <div>
                <h2 class="text-[11px] font-bold tracking-wider text-slate-400 uppercase mb-2">Buscar y Seleccionar</h2>
                
                <div class="relative mb-3">
                    <span class="absolute inset-y-0 left-0 pl-2.5 flex items-center text-slate-500">
                        <i data-lucide="search" class="w-3.5 h-3.5"></i>
                    </span>
                    <input type="text" id="hazard-search" oninput="filterHazards()" placeholder="Buscar riesgo específico..." class="w-full bg-slate-900 text-slate-200 text-xs rounded-lg pl-8 pr-3 py-2 border border-slate-700 focus:outline-none focus:border-amber-500 transition">
                </div>

                <div class="grid grid-cols-1 gap-1.5" id="risk-library">
                    <!-- Los 23 riesgos se inyectan dinámicamente aquí -->
                </div>
            </div>
        </aside>

        <!-- Área de visualización y colocación de riesgos -->
        <main class="flex-1 workspace-grid flex items-center justify-center p-4 overflow-auto relative">
            
            <div id="map-container" class="relative bg-white shadow-xl rounded-lg overflow-hidden transition-all duration-300 border-2 border-slate-700 hidden max-w-full">
                <!-- Imagen o plano del espacio -->
                <img id="map-background" class="block w-full h-auto select-none pointer-events-none" alt="Plano de planta">
                
                <!-- Capa interactiva de marcadores -->
                <div id="markers-layer" class="absolute inset-0 w-full h-full"></div>
            </div>

            <!-- Caja de bienvenida cuando no hay plano cargado -->
            <div id="empty-state" class="text-center p-6 bg-slate-850 border border-slate-700 rounded-xl max-w-md shadow-lg">
                <div class="w-12 h-12 bg-slate-800 text-amber-400 rounded-full flex items-center justify-center mx-auto mb-3">
                    <i data-lucide="map" class="w-6 h-6"></i>
                </div>
                <h3 class="text-sm font-bold mb-1 text-white">No hay plano de trabajo</h3>
                <p class="text-slate-400 text-xs mb-4">Sube un plano o carga el ejemplo de distribución para comenzar a colocar tus pictogramas de seguridad.</p>
                <div class="flex gap-2 justify-center">
                    <button onclick="document.getElementById('file-upload').click()" class="bg-amber-500 hover:bg-amber-400 text-slate-950 font-bold px-4 py-2 rounded-lg text-xs flex items-center gap-1.5 transition">
                        <i data-lucide="upload" class="w-3.5 h-3.5"></i>
                        <span>Subir Plano</span>
                    </button>
                    <button onclick="loadSampleImage()" class="bg-slate-800 hover:bg-slate-700 text-slate-300 border border-slate-700 px-4 py-2 rounded-lg text-xs transition">
                        Usar Ejemplo
                    </button>
                </div>
            </div>

        </main>
    </div>

    <!-- Modal de confirmación para restaurar el plano -->
    <div id="confirm-modal" class="fixed inset-0 bg-slate-950/80 backdrop-blur-sm hidden items-center justify-center z-50 p-4">
        <div class="bg-slate-800 border border-slate-700 w-full max-w-xs rounded-xl p-5 text-center shadow-2xl">
            <h3 class="text-sm font-bold text-white mb-2">¿Eliminar todos los pictogramas?</h3>
            <p class="text-slate-400 text-xs mb-5">Esta acción limpiará todos los riesgos colocados en el plano actual.</p>
            <div class="flex gap-2 justify-center">
                <button onclick="closeConfirmModal()" class="bg-slate-700 hover:bg-slate-600 text-slate-200 text-xs px-3.5 py-2 rounded-lg font-semibold transition">Cancelar</button>
                <button onclick="executeClearAll()" class="bg-red-600 hover:bg-red-500 text-white text-xs px-3.5 py-2 rounded-lg font-semibold transition">Sí, eliminar todo</button>
            </div>
        </div>
    </div>

    <!-- Notificaciones tostadora -->
    <div id="toast-container" class="fixed bottom-4 right-4 z-50 flex flex-col gap-1.5"></div>

    <script>
        // Los 23 riesgos requeridos exactamente mapeados a sus respectivos códigos de diseño
        const RISKS_CATALOG = [
            { id: '1', label: 'Puntos de Atrapamiento / Nips', group: 'MECÁNICO' },
            { id: '2', label: 'Superficies  Filosas y Cuchillas', group: 'MECÁNICO' },
            { id: '3', label: 'Proyección de Objetos', group: 'MECÁNICO' },
            { id: '4', label: 'Peligros Eléctricos (Electrocución / Arco Eléctrico)', group: 'ELÉCTRICO' },
            { id: '5', label: 'Peligros de Lógica de Control', group: 'SISTEMAS' },
            { id: '6', label: 'Partes en Movimiento', group: 'MECÁNICO' },
            { id: '7', label: 'Superficies Calientes / Generación de Calor / Calentamiento de Materia Prima, Subproducto y Producto Terminado', group: 'TERMOCOPLAS' },
            { id: '8', label: 'Electricidad Estática', group: 'ELÉCTRICO' },
            { id: '9', label: 'Superficies Frías', group: 'TERMOCOPLAS' },
            { id: '10', label: 'Espacios Reducidos / Limitados', group: 'OPERACIÓN' },
            { id: '11', label: 'Ruido por arriba de los 85dBA', group: 'AMBIENTE' },
            { id: '12', label: 'Vibraciones', group: 'MECÁNICO' },
            { id: '13', label: 'Aislamiento y Disipación de Energía (Eléctrica, Hidráulica y Neumática) / Arranques Inesperados', group: 'ENERGÍA' },
            { id: '14', label: 'Iluminación', group: 'AMBIENTE' },
            { id: '15', label: 'Energía Neumática / Hidráulica', group: 'ENERGÍA' },
            { id: '16', label: 'Paros (Normal - Emergenica) and Restablecimiento de la Máquina (Mecánico y Eléctrico)', group: 'EMERGENCIA' },
            { id: '17', label: 'Radiaciones Ionizantes / No Ionizantes (microondas, infrarojo, luz ultravioleta, elementos radioactivos, láseres)', group: 'RADIACIÓN' },
            { id: '18', label: 'Químicos (materiales peligrosos - fluidos, gases, neblinas, humos, polvos)', group: 'QUÍMICO' },
            { id: '19', label: 'Peligros Biológicos', group: 'BIOLÓGICO' },
            { id: '20', label: 'Ergonomía / Uso de Herramienta / Bipedestación', group: 'ERGONOMÍA' },
            { id: '21', label: 'Caidas a mismo nivel', group: 'CAÍDAS' },
            { id: '22', label: 'Caidas a diferente nivel', group: 'CAÍDAS' },
            { id: '23', label: 'Peligros de incendio/explosión/implosión', group: 'FUEGO' }
        ];

        let appState = {
            imageSrc: null,
            imageName: '',
            markers: []
        };

        let isDragging = false;
        let dragTarget = null;
        let startX, startY;
        let originalLeft, originalTop;

        // Generador visual de las tarjetas izquierdas
        function renderRiskLibrary(filterText = '') {
            const container = document.getElementById('risk-library');
            container.innerHTML = '';

            const filteredRisks = RISKS_CATALOG.filter(risk => 
                risk.label.toLowerCase().includes(filterText.toLowerCase())
            );

            if (filteredRisks.length === 0) {
                container.innerHTML = `<div class="text-[11px] text-slate-500 text-center py-4">No se encontraron riesgos</div>`;
                return;
            }

            filteredRisks.forEach(risk => {
                const btn = document.createElement('button');
                btn.onclick = () => addMarker(risk.id);
                btn.className = "w-full text-left bg-slate-850 hover:bg-slate-750 border border-slate-800 p-2 rounded-lg flex items-center gap-2.5 transition active:scale-[0.98]";
                
                const previewHTML = getYellowTriangleSVG(risk.id, 'small');

                btn.innerHTML = `
                    <div class="shrink-0">${previewHTML}</div>
                    <div class="min-w-0 flex-1">
                        <div class="text-[11px] font-bold text-slate-200 leading-tight block break-words" title="${risk.label}">${risk.label}</div>
                    </div>
                `;
                container.appendChild(btn);
            });
        }

        function filterHazards() {
            const query = document.getElementById('hazard-search').value;
            renderRiskLibrary(query);
        }

        // MOTOR VECTORIAL EXACTO DE PICTOGRAMAS OFICIALES (ISO 7010 / NOM-026)
        function getYellowTriangleSVG(riskId, size = 'small') {
            const dim = size === 'small' ? 'w-6 h-6' : 'w-7 h-7';
            let innerSymbolPath = '';
            
            // Render de los vectores exactos correspondientes a los planos subidos
            if (riskId === '4' || riskId === '8' || riskId === '13') {
                // Peligro Eléctrico Oficial (Rayo vertical de imagen_2.png)
                innerSymbolPath = `
                    <path d="M53.5,25 L39.5,48 H48 L39,72 L42.5,72 L44,67 L48.5,70 L45.5,63 H49.5 L57.5,43 H50 L53.5,25 Z" fill="#1e293b"/>
                `;
            } else if (riskId === '3') {
                // Proyección de Objetos Oficial (Semisfera con partículas disparadas de imagen_5.png)
                innerSymbolPath = `
                    <line x1="28" y1="78" x2="72" y2="78" stroke="#1e293b" stroke-width="4.5" stroke-linecap="round"/>
                    <path d="M34,78 A16,16 0 0,1 66,78 Z" fill="#1e293b"/>
                    <path d="M72,56 L55,67 L58,71 L75,60 Z" fill="#1e293b"/>
                    <polygon points="50,43 53,39 55,43" fill="#1e293b"/>
                    <polygon points="44,48 47,44 49,49" fill="#1e293b"/>
                    <polygon points="38,54 41,50 43,55" fill="#1e293b"/>
                    <polygon points="33,61 36,57 38,62" fill="#1e293b"/>
                    <polygon points="44,34 47,29 49,34" fill="#1e293b"/>
                    <polygon points="38,40 41,35 43,41" fill="#1e293b"/>
                    <polygon points="32,47 35,42 37,48" fill="#1e293b"/>
                    <polygon points="38,27 41,22 43,27" fill="#1e293b"/>
                    <polygon points="32,32 35,27 37,33" fill="#1e293b"/>
                    <polygon points="27,39 29,34 32,40" fill="#1e293b"/>
                `;
            } else if (riskId === '2') {
                // Superficies filosas y cuchillas (Mano tocando disco dentado de imagen_4.png)
                innerSymbolPath = `
                    <path d="M30,73 C30,51 48,45 60,51 L60,73 Z" fill="#1e293b"/>
                    <path d="M40,73 L43,64 L48,73 L52,64 L57,73 L61,64 L66,73 L70,64 L73,73 Z" fill="#1e293b"/>
                    <line x1="26" y1="75" x2="74" y2="75" stroke="#1e293b" stroke-width="3" stroke-linecap="round"/>
                    <path d="M76,53 L61,57 C58,58 54,58 51,60 C49,61 51,63 53,63 L59,62 L50,65 C48,66 50,68 52,67 L60,64 L53,69 C52,70 54,72 56,71 L64,65 L76,63 Z" fill="#1e293b"/>
                `;
            } else if (riskId === '1' || riskId === '6') {
                // Puntos de Atrapamiento / Nips (Mano atrapada en engranajes de imagen_3.png)
                innerSymbolPath = `
                    <g stroke="#1e293b" stroke-width="4.5" stroke-linecap="round">
                        <line x1="55" y1="58" x2="55" y2="82" />
                        <line x1="43" y1="70" x2="67" y2="70" />
                        <line x1="46" y1="61" x2="64" y2="79" />
                        <line x1="46" y1="79" x2="64" y2="61" />
                    </g>
                    <circle cx="55" cy="70" r="9" fill="#facc15" stroke="#1e293b" stroke-width="3"/>
                    <circle cx="55" cy="70" r="2.5" fill="#1e293b"/>
                    <g stroke="#1e293b" stroke-width="3.5" stroke-linecap="round">
                        <line x1="66" y1="49" x2="66" y2="67" />
                        <line x1="57" y1="58" x2="75" y2="58" />
                        <line x1="60" y1="52" x2="72" y2="64" />
                        <line x1="60" y1="64" x2="72" y2="52" />
                    </g>
                    <circle cx="66" cy="58" r="6.5" fill="#facc15" stroke="#1e293b" stroke-width="2.5"/>
                    <circle cx="66" cy="58" r="1.5" fill="#1e293b"/>
                    <path d="M33,34 L49,49 C50.5,50.5 49,53 46,54.5 C43,56 41,53.5 39,51.5 L24,36 Z" fill="#1e293b" />
                    <path d="M37,47 C35.5,51 37.5,52.5 39.5,51 C41,49.5 40,46.5 37,47 Z" fill="#1e293b" />
                    <path d="M49,48 L57,53.5 C58.5,54.5 57,56.5 55,55.5 L47,50 Z" fill="#1e293b" />
                    <path d="M72,64 C74.5,63.5 76,64.5 77,66 C75,67 73,66 72,64 Z" fill="#1e293b" />
                    <path d="M74,70 C76,70 77,71.5 76,73.5 C74.5,73 73.5,71.5 74,70 Z" fill="#1e293b" />
                `;
            } else if (riskId === '7') {
                // Superficies calientes (Línea de piso con 4 ondas de temperatura de imagen_6.png)
                innerSymbolPath = `
                    <line x1="24" y1="74" x2="76" y2="74" stroke="#1e293b" stroke-width="4.5" stroke-linecap="round"/>
                    <path d="M 34,68 C 31,56 37,48 34,36 M 45,68 C 42,56 48,48 45,36 M 55,68 C 52,56 58,48 55,36 M 66,68 C 63,56 69,48 66,36" stroke="#1e293b" stroke-width="4.5" stroke-linecap="round" fill="none"/>
                `;
            } else if (riskId === '9') {
                // Superficies frías (Copo de nieve simétrico de imagen_7.png)
                innerSymbolPath = `
                    <circle cx="50" cy="55" r="4.5" fill="#1e293b" />
                    <g stroke="#1e293b" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
                        <g transform="rotate(0, 50, 55)">
                            <line x1="50" y1="55" x2="50" y2="32" />
                            <line x1="50" y1="41" x2="43" y2="35" />
                            <line x1="50" y1="41" x2="57" y2="35" />
                            <line x1="50" y1="48" x2="45" y2="43" />
                            <line x1="50" y1="48" x2="55" y2="43" />
                        </g>
                        <g transform="rotate(60, 50, 55)">
                            <line x1="50" y1="55" x2="50" y2="32" />
                            <line x1="50" y1="41" x2="43" y2="35" />
                            <line x1="50" y1="41" x2="57" y2="35" />
                            <line x1="50" y1="48" x2="45" y2="43" />
                            <line x1="50" y1="48" x2="55" y2="43" />
                        </g>
                        <g transform="rotate(120, 50, 55)">
                            <line x1="50" y1="55" x2="50" y2="32" />
                            <line x1="50" y1="41" x2="43" y2="35" />
                            <line x1="50" y1="41" x2="57" y2="35" />
                            <line x1="50" y1="48" x2="45" y2="43" />
                            <line x1="50" y1="48" x2="55" y2="43" />
                        </g>
                        <g transform="rotate(180, 50, 55)">
                            <line x1="50" y1="55" x2="50" y2="32" />
                            <line x1="50" y1="41" x2="43" y2="35" />
                            <line x1="50" y1="41" x2="57" y2="35" />
                            <line x1="50" y1="48" x2="45" y2="43" />
                            <line x1="50" y1="48" x2="55" y2="43" />
                        </g>
                        <g transform="rotate(240, 50, 55)">
                            <line x1="50" y1="55" x2="50" y2="32" />
                            <line x1="50" y1="41" x2="43" y2="35" />
                            <line x1="50" y1="41" x2="57" y2="35" />
                            <line x1="50" y1="48" x2="45" y2="43" />
                            <line x1="50" y1="48" x2="55" y2="43" />
                        </g>
                        <g transform="rotate(300, 50, 55)">
                            <line x1="50" y1="55" x2="50" y2="32" />
                            <line x1="50" y1="41" x2="43" y2="35" />
                            <line x1="50" y1="41" x2="57" y2="35" />
                            <line x1="50" y1="48" x2="45" y2="43" />
                            <line x1="50" y1="48" x2="55" y2="43" />
                        </g>
                    </g>
                `;
            } else if (riskId === '10') {
                // Espacio reducido / Limitado (Operario agachado entrando a la compuerta circular de imagen_8.png)
                innerSymbolPath = `
                    <path d="M42,21 L58,21 M38,26 L62,26 M34,31 L66,31" stroke="#1e293b" stroke-width="4" stroke-linecap="round"/>
                    <path d="M25,55 L25,78 M31,51 L31,78 M37,47 L37,78 M43,44 L43,78" stroke="#1e293b" stroke-width="4" stroke-linecap="round"/>
                    <path d="M57,44 L57,78 M63,47 L63,78 M69,51 L69,78 M75,55 L75,78" stroke="#1e293b" stroke-width="4" stroke-linecap="round"/>
                    <circle cx="53.5" cy="54" r="4.5" fill="#1e293b"/>
                    <path d="M31,73 Q36,60 43,58 L50,57.5 L52,61 L46,63.5 L42,73" fill="none" stroke="#1e293b" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M47,59 L48,66 L42,72" fill="none" stroke="#1e293b" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
                `;
            } else if (riskId === '11') {
                // Ruido por arriba de los 85dBA (Cabeza frontal y ondas de choque laterales de imagen_9.png)
                innerSymbolPath = `
                    <path d="M44,70 L44,66 C44,66 41.5,63.5 41.5,57 C41.5,57 40,56 40,54.5 C40,53 41.5,52.5 41.5,52.5 C41.5,51 42,49 42,46 C42,40 45.5,36.5 50,36.5 C54.5,36.5 58,40 58,46 C58,49 58.5,51 58.5,52.5 C58.5,52.5 60,53 60,54.5 C60,56 58.5,57 58.5,57 C58.5,63.5 56,66 56,66 L56,70 Z" fill="#1e293b"/>
                    <g stroke="#1e293b" stroke-width="4.2" fill="none" stroke-linecap="round">
                        <path d="M34,48 A 9,9 0 0,0 34,61" />
                        <path d="M29,43 A 15,15 0 0,0 29,66" />
                        <path d="M24,38 A 21,21 0 0,0 24,71" />
                        <path d="M66,48 A 9,9 0 0,1 66,61" />
                        <path d="M71,43 A 15,15 0 0,1 71,66" />
                        <path d="M76,38 A 21,21 0 0,1 76,71" />
                    </g>
                `;
            } else if (riskId === '12') {
                // Vibraciones (Operador en consola con ondas perimetrales de imagen_10.png)
                innerSymbolPath = `
                    <rect x="25" y="69" width="16" height="9" fill="#1e293b" rx="1"/>
                    <line x1="33" y1="69" x2="33" y2="60" stroke="#1e293b" stroke-width="3.2" stroke-linecap="round"/>
                    <circle cx="33" cy="57" r="2.5" fill="#1e293b"/>
                    <line x1="18" y1="78" x2="82" y2="78" stroke="#1e293b" stroke-width="5" stroke-linecap="round"/>
                    <circle cx="43" cy="52" r="4.2" fill="#1e293b"/>
                    <path d="M43,55 Q33,56 33,59" stroke="#1e293b" stroke-width="4.2" stroke-linecap="round" fill="none"/>
                    <path d="M43,55 Q50,56 52,63" stroke="#1e293b" stroke-width="4.2" stroke-linecap="round" fill="none"/>
                    <path d="M52,63 L52,78" stroke="#1e293b" stroke-width="4.2" stroke-linecap="round" fill="none"/>
                    <path d="M52,63 L45,78" stroke="#1e293b" stroke-width="4.2" stroke-linecap="round" fill="none"/>
                    <path d="M37,45 A 8,8 0 0,1 49,45" stroke="#1e293b" stroke-width="2.5" fill="none" stroke-linecap="round"/>
                    <path d="M34,41 A 13,13 0 0,1 52,41" stroke="#1e293b" stroke-width="2.5" fill="none" stroke-linecap="round"/>

                    <path d="M64,63 A 17,17 0 0,1 64,81" stroke="#1e293b" stroke-width="2.5" fill="none" stroke-linecap="round"/>
                `;
            } else if (riskId === '15') {
                // Energía Neumática (Círculo oficial con 3 líneas divergentes fanned de imagen_11.png)
                innerSymbolPath = `
                    <circle cx="50" cy="55" r="20" fill="none" stroke="#1e293b" stroke-width="4.5"/>
                    <line x1="30" y1="55" x2="70" y2="55" stroke="#1e293b" stroke-width="4.5" stroke-linecap="round"/>

                    <line x1="31.5" y1="58.5" x2="66" y2="66.5" stroke="#1e293b" stroke-width="4.5" stroke-linecap="round"/>
                `;
            } else if (riskId === '16') {
                // PAROS Y RESTABLECIMIENTO (Mano presionando el botón de paro en pared de imagen_14.png e imagen_15.png)
                innerSymbolPath = `
                    <!-- Placa o pared vertical a la izquierda -->
                    <rect x="33" y="35" width="4" height="40" fill="#1e293b" />
                    <!-- Caja o base de montaje del botón de paro -->
                    <rect x="37" y="47" width="6" height="16" fill="#1e293b" />
                    <!-- Cabeza de hongo del botón (Pulsador presionado) -->
                    <ellipse cx="44" cy="55" rx="2.5" ry="9" fill="#1e293b" />
                    
                    <!-- Mano extendida presionando de derecha a izquierda -->
                    <!-- Dedo índice apuntando directamente a la cabeza del hongo -->
                    <path d="M44,53 L62,53 C63.5,53 63.5,57 62,57 L44,57 Z" fill="#1e293b" />

                    <path d="M51,57 L61,57 C62.5,57 62.5,61 61,61 L51,61 Z" fill="#1e293b" />
                    <path d="M51,61 L61,61 C62.5,61 62.5,65 61,65 L51,65 Z" fill="#1e293b" />

                    <!-- Palma y dorso de la mano -->
                    <path d="M61,53 L70,53 L70,69 L61,69 Z" fill="#1e293b" />
                    <!-- Detalle de puño de camisa / muñequera -->
                    <rect x="70" y="54" width="4" height="14" rx="1.5" fill="#1e293b" />
                `;
            } else if (riskId === '23') {
                // Peligro de Incendio / Combustible (Llama de fuego negra y línea base horizontal de imagen_13.png)
                innerSymbolPath = `
                    <line x1="31" y1="74" x2="69" y2="74" stroke="#1e293b" stroke-width="4" stroke-linecap="round"/>
                    <path d="M50,28 C45.5,38 41.5,43 35.5,48.5 C31.5,52.5 32,59 34,64 C36,69 42,73 50,73 C58,73 64,69 66,64 C68,59 68.5,52.5 64.5,48.5 C58.5,43 54.5,38 50,28 Z M50,44 C53,49 55.5,53 55.5,57.5 C55.5,61.5 53,64 50,64 C47,64 44.5,61.5 44.5,57.5 C44.5,53 47,49 50,44 Z" fill="#1e293b" fill-rule="evenodd"/>
                `;
            } else if (riskId === '5') {
                // Peligro de Lógica de Control (Placa chip electrónica con puertos)
                innerSymbolPath = `
                    <rect x="36" y="41" width="28" height="28" rx="2" fill="none" stroke="#1e293b" stroke-width="4"/>
                    <path d="M44,41 L44,36 M56,41 L56,36 M44,69 L44,74 M56,69 L56,74 M36,49 L31,49 M36,61 L31,61 M64,49 L69,49 M64,61 L69,61" stroke="#1e293b" stroke-width="3.5" stroke-linecap="round"/>
                    <circle cx="50" cy="55" r="4" fill="#1e293b"/>
                `;
            } else if (riskId === '14') {
                // Iluminación (Foco incandescente con haces de luz)
                innerSymbolPath = `
                    <path d="M38,50 A12,12 0 1,1 62,50 C62,57 56,59 55,65 L45,65 C44,59 38,57 38,50 Z" fill="none" stroke="#1e293b" stroke-width="4" stroke-linejoin="round"/>
                    <line x1="43" y1="70" x2="57" y2="70" stroke="#1e293b" stroke-width="4.5" stroke-linecap="round"/>
                    <line x1="46" y1="74" x2="54" y2="74" stroke="#1e293b" stroke-width="4.5" stroke-linecap="round"/>
                    <path d="M50,23 L50,15 M27,38 L19,34 M73,38 L81,34 M30,64 L24,70 M70,64 L76,70" stroke="#1e293b" stroke-width="3" stroke-linecap="round"/>
                `;
            } else if (riskId === '17') {
                // Radiación (Trébol de advertencia atómica oficial)
                innerSymbolPath = `
                    <circle cx="50" cy="56" r="7" fill="#1e293b"/>
                    <path d="M50,56 L35,30 A30,30 0 0,1 65,30 Z" fill="#1e293b"/>
                    <path d="M50,56 L76,71 A30,30 0 0,1 61,81 Z" fill="#1e293b"/>
                    <path d="M50,56 L24,71 A30,30 0 0,1 39,81 Z" fill="#1e293b"/>
                `;
            } else if (riskId === '18') {
                // Químicos (Ácidos goteando de tubos de ensayo sobre superficie)
                innerSymbolPath = `
                    <line x1="24" y1="74" x2="76" y2="74" stroke="#1e293b" stroke-width="4" stroke-linecap="round"/>
                    <path d="M36,46 L46,26 L52,29 L42,49 Z" fill="#1e293b"/>
                    <path d="M64,46 L54,26 L48,29 L58,49 Z" fill="#1e293b"/>
                    <path d="M36,74 Q36,64 44,64 L52,64 C55,64 58,66 56,71" fill="none" stroke="#1e293b" stroke-width="4" stroke-linecap="round"/>
                    <circle cx="43" cy="56" r="2" fill="#1e293b"/>
                    <circle cx="57" cy="56" r="2" fill="#1e293b"/>
                `;
            } else if (riskId === '19') {
                // Riesgo Biológico (Tres semicírculos cruzados entrelazados de peligro bio)
                innerSymbolPath = `
                    <g stroke="#1e293b" stroke-width="4" fill="none">
                        <circle cx="43" cy="47" r="11"/>
                        <circle cx="57" cy="47" r="11"/>
                        <circle cx="50" cy="60" r="11"/>
                    </g>
                    <circle cx="50" cy="51" r="5" fill="#1e293b"/>
                `;
            } else if (riskId === '20') {
                // Ergonomía (Persona doblando columna para alzar peso de caja)
                innerSymbolPath = `
                    <circle cx="55" cy="38" r="4.5" fill="#1e293b"/>
                    <path d="M32,74 L42,74 L46,58 L40,48 L56,46 L62,56" fill="none" stroke="#1e293b" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
                    <rect x="58" y="58" width="12" height="12" rx="1" fill="#1e293b"/>
                `;
            } else if (riskId === '21') {
                // Caídas mismo nivel (Hombre resbalando en piso húmedo)
                innerSymbolPath = `
                    <circle cx="56" cy="36" r="4.5" fill="#1e293b"/>
                    <path d="M32,74 Q44,74 48,65 L56,50 L46,45 L38,48" fill="none" stroke="#1e293b" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M48,65 L58,74 L68,71" fill="none" stroke="#1e293b" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M26,76 C32,76 38,72 40,68" fill="none" stroke="#1e293b" stroke-width="3" stroke-linecap="round"/>
                `;
            } else if (riskId === '22') {
                // Caídas diferente nivel (Hombre perdiendo equilibrio sobre escalera)
                innerSymbolPath = `
                    <path d="M20,76 L44,76 L44,60 L62,60 L62,44 L78,44" stroke="#1e293b" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
                    <circle cx="34" cy="38" r="4.5" fill="#1e293b"/>
                    <path d="M24,56 L34,48 L32,58 L26,68" fill="none" stroke="#1e293b" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
                `;
            } else {
                // Símbolo por defecto: Signo de admiración industrial (!)
                innerSymbolPath = `
                    <path d="M50,32 L50,58" stroke="#1e293b" stroke-width="8" stroke-linecap="round"/>
                    <circle cx="50" cy="72" r="5" fill="#1e293b"/>
                `;
            }

            return `
                <div class="relative ${dim} flex items-center justify-center">
                    <svg viewBox="0 0 100 100" class="absolute inset-0 w-full h-full" xmlns="http://www.w3.org/2000/svg">
                        <polygon points="50,10 92,85 8,85" fill="#facc15" stroke="#1e293b" stroke-width="8" stroke-linejoin="round"/>
                        ${innerSymbolPath}
                    </svg>
                </div>
            `;
        }

        function handleImageUpload(event) {
            const file = event.target.files[0];
            if (file && file.type.startsWith('image/')) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    appState.imageSrc = e.target.result;
                    appState.imageName = file.name;
                    updateWorkspace();
                    showToast('Plano cargado con éxito');
                };
                reader.readAsDataURL(file);
            }
        }

        // Carga de plano ejemplo si el usuario no tiene croquis
        function loadSampleImage() {
            const samplePlanSvg = `
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500" style="background:#ffffff; font-family:sans-serif;">
                    <rect width="800" height="500" fill="#f8fafc" />
                    <defs>
                        <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
                            <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#f1f5f9" stroke-width="1"/>
                        </pattern>
                    </defs>
                    <rect width="800" height="500" fill="url(#grid)" />
                    <rect x="15" y="15" width="770" height="470" fill="none" stroke="#475569" stroke-width="4" rx="2" />
                    
                    <rect x="15" y="15" width="250" height="150" fill="#f8fafc" stroke="#64748b" stroke-width="2" />
                    <text x="30" y="40" font-size="10" font-weight="bold" fill="#475569">ÁREA QUÍMICOS Y LOGÍSTICA</text>

                    <rect x="450" y="15" width="335" height="150" fill="#fef2f2" stroke="#ef4444" stroke-width="2" />
                    <text x="465" y="40" font-size="10" font-weight="bold" fill="#b91c1c">SUBESTACIÓN ELÉCTRICA / COMPRESOR</text>

                    <rect x="15" y="240" width="450" height="245" fill="#f8fafc" stroke="#64748b" stroke-width="2" />
                    <text x="30" y="265" font-size="10" font-weight="bold" fill="#475569">ZONA DE MÁQUINAS Y PROCESADO</text>

                    <rect x="520" y="240" width="265" height="245" fill="#f0fdf4" stroke="#22c55e" stroke-width="2" />
                    <text x="535" y="265" font-size="10" font-weight="bold" fill="#15803d">ADMINISTRACIÓN / OFICINAS</text>

                    <text x="320" y="210" font-size="11" font-weight="bold" fill="#94a3b8" letter-spacing="2">PASILLO DE CIRCULACIÓN</text>
                </svg>
            `;
            const blob = new Blob([samplePlanSvg], {type: 'image/svg+xml;charset=utf-8'});
            appState.imageSrc = URL.createObjectURL(blob);
            appState.imageName = "Plano_Planta_Industrial.svg";
            updateWorkspace();
            showToast('Plano de ejemplo cargado');
        }

        function updateWorkspace() {
            const container = document.getElementById('map-container');
            const bgImage = document.getElementById('map-background');
            const emptyState = document.getElementById('empty-state');

            if (appState.imageSrc) {
                bgImage.src = appState.imageSrc;
                container.classList.remove('hidden');
                emptyState.classList.add('hidden');
                renderAllMarkers();
            } else {
                container.classList.add('hidden');
                emptyState.classList.remove('hidden');
            }
        }

        function addMarker(riskId) {
            if (!appState.imageSrc) {
                showToast('Primero carga una imagen o usa la de ejemplo');
                return;
            }
            const marker = {
                id: 'm_' + Date.now() + '_' + Math.floor(Math.random() * 100),
                riskId: riskId,
                x: 50,
                y: 50
            };
            appState.markers.push(marker);
            renderMarker(marker);
        }

        function renderAllMarkers() {
            document.getElementById('markers-layer').innerHTML = '';
            appState.markers.forEach(renderMarker);
        }

        function renderMarker(marker) {
            const layer = document.getElementById('markers-layer');
            const risk = RISKS_CATALOG.find(r => r.id === marker.riskId);
            if (!risk) return;

            const element = document.createElement('div');
            element.id = marker.id;
            element.className = "absolute select-none cursor-grab active:cursor-grabbing group z-10 flex flex-col items-center";
            element.style.left = `${marker.x}%`;
            element.style.top = `${marker.y}%`;
            element.style.transform = 'translate(-50%, -50%)';

            const signHTML = getYellowTriangleSVG(marker.riskId, 'large');

            element.innerHTML = `
                <!-- Cuadro de texto permanente con el nombre del riesgo arriba de la señal -->
                <div class="mb-1 w-32 bg-slate-900/95 border border-slate-700 text-white text-[9px] font-bold py-1 px-1.5 rounded shadow-lg text-center leading-tight break-words">
                    ${risk.label}
                </div>

                <div class="relative p-0.5 rounded-full bg-slate-900/40 shadow-sm group-hover:scale-105 transition duration-150">
                    ${signHTML}
                    
                    <!-- Botón de eliminación directo en hover (X) -->
                    <button class="absolute -top-1.5 -right-1.5 w-4 h-4 bg-red-600 hover:bg-red-500 text-white text-[9px] font-extrabold rounded-full flex items-center justify-center opacity-0 group-hover:opacity-100 transition shadow border border-white/20" title="Eliminar">
                        &times;
                    </button>
                </div>
            `;

            element.addEventListener('mousedown', (e) => startDrag(e, marker));
            element.addEventListener('touchstart', (e) => startDrag(e, marker), { passive: false });

            element.querySelector('button').addEventListener('click', (e) => {
                e.stopPropagation();
                deleteMarker(marker.id);
            });

            layer.appendChild(element);
        }

        function startDrag(e, marker) {
            e.stopPropagation();
            if (e.cancelable) e.preventDefault();

            isDragging = false;
            dragTarget = document.getElementById(marker.id);
            dragTarget.classList.add('dragging');

            const container = document.getElementById('map-container');
            const rect = container.getBoundingClientRect();

            const clientX = e.type.startsWith('touch') ? e.touches[0].clientX : e.clientX;
            const clientY = e.type.startsWith('touch') ? e.touches[0].clientY : e.clientY;

            startX = clientX;
            startY = clientY;

            originalLeft = marker.x;
            originalTop = marker.y;

            const onMouseMove = (moveEvent) => {
                const currentX = moveEvent.type.startsWith('touch') ? moveEvent.touches[0].clientX : moveEvent.clientX;
                const currentY = moveEvent.type.startsWith('touch') ? moveEvent.touches[0].clientY : moveEvent.clientY;

                const deltaX = currentX - startX;
                const deltaY = currentY - startY;

                if (Math.abs(deltaX) > 2 || Math.abs(deltaY) > 2) {
                    isDragging = true;
                }

                const percentX = (deltaX / rect.width) * 100;
                const percentY = (deltaY / rect.height) * 100;

                let newX = originalLeft + percentX;
                let newY = originalTop + percentY;

                newX = Math.max(1, Math.min(99, newX));
                newY = Math.max(1, Math.min(99, newY));

                dragTarget.style.left = `${newX}%`;
                dragTarget.style.top = `${newY}%`;

                marker.x = newX;
                marker.y = newY;
            };

            const onMouseUp = () => {
                if (dragTarget) dragTarget.classList.remove('dragging');
                document.removeEventListener('mousemove', onMouseMove);
                document.removeEventListener('mouseup', onMouseUp);
                document.removeEventListener('touchmove', onMouseMove);
                document.removeEventListener('touchend', onMouseUp);
                setTimeout(() => { isDragging = false; }, 50);
            };

            document.addEventListener('mousemove', onMouseMove);
            document.addEventListener('mouseup', onMouseUp);
            document.addEventListener('touchmove', onMouseMove, { passive: false });
            document.addEventListener('touchend', onMouseUp);
        }

        function deleteMarker(markerId) {
            appState.markers = appState.markers.filter(m => m.id !== markerId);
            renderAllMarkers();
            showToast('Pictograma removido');
        }

        function openConfirmModal() {
            if (appState.markers.length === 0) {
                showToast('No hay pictogramas para eliminar');
                return;
            }
            document.getElementById('confirm-modal').classList.remove('hidden');
            document.getElementById('confirm-modal').classList.add('flex');
        }

        function closeConfirmModal() {
            document.getElementById('confirm-modal').classList.add('hidden');
            document.getElementById('confirm-modal').classList.remove('flex');
        }

        function executeClearAll() {
            appState.markers = [];
            renderAllMarkers();
            closeConfirmModal();
            showToast('Todos los pictogramas fueron eliminados');
        }

        function exportAsImage() {
            if (!appState.imageSrc) return;
            showToast('Exportando plano con nombres de riesgo...');

            const container = document.getElementById('map-container');
            const options = {
                useCORS: true,
                allowTaint: true,
                scale: 2,
                backgroundColor: null,
                logging: false
            };

            html2canvas(container, options).then(canvas => {
                const dataUrl = canvas.toDataURL('image/png');
                const link = document.createElement('a');
                link.download = `Mapa_Riesgos_${appState.imageName.split('.')[0]}.png`;
                link.href = dataUrl;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                showToast('¡Exportación lista!');
            }).catch(() => {
                showToast('Error al procesar la exportación');
            });
        }

        function showToast(message) {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = "bg-slate-950/95 border border-slate-700 text-slate-100 text-xs font-semibold px-4 py-2.5 rounded-lg shadow-xl flex items-center gap-2 transition duration-300 opacity-0 transform translate-y-1";
            toast.innerHTML = `
                <i data-lucide="info" class="w-4 h-4 text-amber-400 shrink-0"></i>
                <span>${message}</span>
            `;
            container.appendChild(toast);
            lucide.createIcons();

            setTimeout(() => {
                toast.classList.remove('opacity-0', 'translate-y-1');
            }, 10);

            setTimeout(() => {
                toast.classList.add('opacity-0', 'scale-95');
                setTimeout(() => { toast.remove(); }, 300);
            }, 3500);
        }

        // Carga inicial
        renderRiskLibrary();
    </script>
